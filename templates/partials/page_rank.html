<!-- ═══════════════ 排行榜页面 ═══════════════ -->
    <div id="rank-page" class="rank-page hidden">
      <div class="rank-header">
        <h2 class="inv-title" style="margin-bottom: var(--space-4);">&#127942; 排行榜</h2>

        <!-- 一级 Tab -->

          <button class="rank-tab active" data-rank="price">价格榜</button>
          <button class="rank-tab" data-rank="hot">热门榜</button>
          <button class="rank-tab" data-rank="volume">成交榜</button>
        </div>

        <!-- 二级 Tab + 时间范围（同行） -->
        <div class="rank-sub-row" id="rank-sub-row">
          <div class="rank-subtabs" id="rank-subtabs">
            <button class="rank-subtab active" data-sub="price_up_rate">涨幅%</button>
            <button class="rank-subtab" data-sub="price_down_rate">跌幅%</button>
            <button class="rank-subtab" data-sub="price_up">涨幅¥</button>
            <button class="rank-subtab" data-sub="price_down">跌幅¥</button>
            <button class="rank-subtab" data-sub="market_cap">总市值</button>
          </div>
          <div class="rank-ctrl-group">
            <select class="rank-time-select" id="rank-time-select">
              <option value="1d" selected>近1天</option>
              <option value="7d">近7天</option>
              <option value="15d">近15天</option>
              <option value="1m">近1个月</option>
              <option value="3m">近3个月</option>
              <option value="6m">近6个月</option>
              <option value="1y">近1年</option>
            </select>
            <button class="rank-filter-btn" id="rank-filter-btn" title="高级筛选">&#9881;</button>
          </div>
        </div>

        <!-- 分页信息 -->

          <span class="rank-page-info" id="rank-page-info">共 0 条</span>
        </div>
      </div>

      <!-- 表格 -->

            <tr>
              <th style="width:48px;">排行</th>
              <th>饰品名称</th>
              <th style="width:88px;">30天走势</th>
              <th>在售价格</th>
              <th>求购价格</th>
              <th>在售数量</th>
              <th id="rank-chg-header">变动率</th>
              <th id="rank-vol-header" class="hidden">日成交量</th>
            </tr>
          </thead>
          <tbody id="rank-tbody">
            <tr><td colspan="5" class="rank-loading">加载中…</td></tr>
          </tbody>
        </table>
      </div>

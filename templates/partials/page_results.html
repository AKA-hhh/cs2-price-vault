    <!-- ── 分析结果 ── -->
    <div id="results-container" class="hidden">

      <div class="analysis-grid">
        <!-- 左列: 走势图 -->
        <div class="ag-left">
          <section class="panel chart-panel">
            <div class="panel-body" id="chart-body">
              <img id="chart-img" src="" alt="走势图">
              <iframe id="chart-iframe" class="hidden" style="width:100%;height:100%;border:none;"></iframe>
            </div>
          </section>
        </div>

        <!-- 右列: 建议+市场左右 + AI -->
        <div class="ag-right">
          <div class="ag-right-top">
            <section class="panel rec-panel">
              <div class="panel-header">
                <span id="rec-dot" class="panel-dot"></span>
                <h2 class="panel-title">建议</h2>
                <span id="rec-badge" class="panel-badge">--</span>
              </div>
              <div class="panel-body">
                <div class="score-row">
                  <div class="score-gauge-wrap">
                    <svg class="score-gauge" viewBox="0 0 120 70">
                      <path d="M15 55 A45 45 0 0 1 105 55" class="gauge-bg"/>
                      <path id="gauge-fill" d="M15 55 A45 45 0 0 1 105 55" class="gauge-fill"/>
                    </svg>
                    <span id="score-value" class="score-value">0</span>
                  </div>
                  <p id="rec-summary" class="rec-text"></p>
                </div>
                <ul id="rec-details" class="signal-list"></ul>
              </div>
            </section>

            <section class="panel detail-panel">
              <div class="panel-header">
                <span class="panel-dot lapis"></span>
                <h2 class="panel-title">市场</h2>
              </div>
              <div class="panel-body">
                <div id="detail-grid" class="detail-grid"></div>
              </div>
            </section>
          </div>

          <section class="panel chat-panel">
            <div class="panel-header">
              <span class="panel-dot amethyst"></span>
              <h2 class="panel-title">AI 助手</h2>
            </div>
            <div class="panel-body chat-body">
              <div id="chat-messages" class="chat-messages"></div>
              <div class="chat-input-row">
                <textarea id="chat-input" rows="2" maxlength="2000"
                          placeholder="输入问题…（上限2000字）"></textarea>
                <span id="chat-char-count" class="chat-char-count"></span>
                <button id="btn-chat-send" class="btn-send" title="发送 (Enter)">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>
                </button>
              </div>
            </div>
          </section>
        </div>
      </div>

    </div>
